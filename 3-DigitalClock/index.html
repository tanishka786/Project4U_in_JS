<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="style.css" />
  <title>Digital Clock</title>
</head>
<body>
  <nav>
    <a href="../index.html" class="nav-brand">⬡ Dev.Lab</a>
    <div class="nav-links">
      <a href="../index.html">← Back</a>
      <a target="_blank" href="https://github.com/tanishka786">GitHub ↗</a>
      <button class="theme-toggle" id="themeBtn" title="Toggle dark mode">🌙</button>
    </div>
  </nav>

  <div class="page-wrap">
    <span class="tag">Project 03</span>
    <h1>Digital Clock ⏱</h1>
    <p class="clock-desc">Your live local time, ticking away.</p>

    <div class="clock-card">
      <div id="clock">00:00:00</div>
    </div>

    <div class="date-badge" id="date-text">Loading...</div>

    <div class="seconds-bar-wrap">
      <div class="seconds-bar" id="seconds-bar" style="width:0%"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    const btn = document.getElementById('themeBtn');
    const html = document.documentElement;
    const saved = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', saved);
    btn.textContent = saved === 'dark' ? '☀️' : '🌙';
    btn.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      btn.textContent = next === 'dark' ? '☀️' : '🌙';
    });
  </script>
</body>
</html>
